<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Baby Talks · Conteúdos postados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--lilas:#8E9BD1;--lilas-esc:#6F7EB8;--magenta:#C95FA3;--azul:#1F2A56;--branco:#F8F7F4;--rosa:#F4DCE8;--lavanda:#E4E6F2;--verde:#2EA66C;--azul-suave:#4A5578}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--branco);color:var(--azul);min-height:100vh;padding:40px 20px 70px}
  .wrap{max-width:760px;margin:0 auto}
  .back{display:inline-block;font-size:13px;font-weight:600;color:var(--lilas-esc);text-decoration:none;margin-bottom:22px}
  .back:hover{color:var(--magenta)}
  .eyebrow{display:inline-block;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--magenta);font-weight:700;margin-bottom:8px}
  h1{font-family:'Fraunces',serif;font-size:38px;line-height:1.05;margin-bottom:6px}
  .sub{font-size:15px;color:var(--azul-suave);margin-bottom:28px}
  .lista{display:flex;flex-direction:column;gap:12px}
  .card{display:flex;gap:14px;background:#fff;border:1px solid var(--lavanda);border-radius:18px;padding:14px;box-shadow:0 10px 26px rgba(31,42,86,.05)}
  .thumb{width:74px;height:74px;border-radius:12px;overflow:hidden;background:var(--lavanda);flex-shrink:0}
  .thumb img,.thumb video{width:100%;height:100%;object-fit:cover}
  .meta{flex:1;min-width:0}
  .row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
  .tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px;background:var(--lavanda);color:var(--azul-suave)}
  .tag.ok{background:rgba(46,166,108,.14);color:var(--verde)}
  .cap{font-size:13px;color:var(--azul-suave);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .link{display:inline-block;margin-top:7px;font-size:13px;font-weight:700;color:var(--magenta);text-decoration:none}
  .link:hover{text-decoration:underline}
  .vazio{text-align:center;color:var(--azul-suave);padding:50px 20px;font-size:15px}
  .vazio .serif{font-family:'Fraunces',serif;font-size:22px;color:var(--lilas-esc);font-style:italic;display:block;margin-bottom:8px}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← Central de Conteúdo</a>
  <span class="eyebrow">Baby Talks</span>
  <h1>Conteúdos postados</h1>
  <p class="sub">O que já foi ao ar no @babytalks.evento — marcado automaticamente pelo studio ao publicar.</p>
  <div class="lista" id="lista"></div>
</div>
<script>
const MIDIA = "midia/";
function fmt(d){ try{ return new Date(d).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}); }catch(e){ return d||""; } }
function ehVideo(f){ return /\.(mp4|mov|m4v|webm)$/i.test(f||""); }
fetch("posts.json?cb="+Date.now()).then(r=>r.json()).then(d=>{
  const postados=(d.posts||[]).filter(p=>p.status==="POSTADO")
    .sort((a,b)=>String(b.postado_em||"").localeCompare(String(a.postado_em||"")));
  const el=document.getElementById("lista");
  if(!postados.length){
    el.innerHTML='<div class="vazio"><span class="serif">Ainda nada postado por aqui.</span>Quando você publicar um post do plano pelo studio, ele aparece aqui com o link.</div>';
    return;
  }
  el.innerHTML=postados.map(p=>{
    const arq=(p.midia||[])[0];
    const src=arq?(arq.startsWith("http")?arq:MIDIA+arq):"";
    const thumb=src?(ehVideo(arq)?`<video src="${src}" muted></video>`:`<img src="${src}" alt="">`):"";
    return `<div class="card">
      <div class="thumb">${thumb}</div>
      <div class="meta">
        <div class="row1">
          <span class="tag">${p.formato||""}</span>
          <span class="tag ok">postado ${p.postado_em?fmt(p.postado_em):""}</span>
        </div>
        <div class="cap">${(p.caption||p.hook||"").replace(/</g,"&lt;")}</div>
        ${p.permalink?`<a class="link" href="${p.permalink}" target="_blank" rel="noopener">ver no Instagram →</a>`:""}
      </div>
    </div>`;
  }).join("");
}).catch(()=>{ document.getElementById("lista").innerHTML='<div class="vazio">Não consegui carregar o plano.</div>'; });
</script>
</body>
</html>
